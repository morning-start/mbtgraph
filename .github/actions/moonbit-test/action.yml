name: 'MoonBit Test'
description: 'Run MoonBit type check, tests, interface update check, and formatting check'
runs:
  using: 'composite'
  steps:
    - name: Type check
      shell: bash
      run: moon check

    - name: Run tests
      shell: bash
      run: moon test

    - name: Update interface and check diff
      shell: bash
      run: moon info && git diff --exit-code

    - name: Format code and check diff
      shell: bash
      run: moon fmt && git diff --exit-code