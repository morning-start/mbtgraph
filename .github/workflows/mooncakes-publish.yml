name: Mooncakes Publish

on:
  push:
    tags: ['v*']

jobs:
  test-lib:
    name: Test MoonBit Library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup MoonBit
        uses: ./.github/actions/moonbit

      - name: Run tests
        uses: ./.github/actions/moonbit-test

  publish:
    name: Publish Module
    runs-on: ubuntu-latest
    needs: [test-lib]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup MoonBit
        uses: ./.github/actions/moonbit

      - name: Write credentials
        run: |
          mkdir -p ~/.moon
          echo "${{ secrets.MOONCAKES_CREDS }}" > ~/.moon/credentials.json

      - name: Publish
        run: moon publish