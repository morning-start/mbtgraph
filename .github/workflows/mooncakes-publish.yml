name: Mooncakes Publish

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test MoonBit Library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup MoonBit
        uses: ./.github/actions/moonbit

      - name: Run tests
        uses: ./.github/actions/moonbit-test

  publish:
    name: Publish Module
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup MoonBit
        uses: ./.github/actions/moonbit

      - name: Write credentials
        env:
          MOONCAKES_CREDS: ${{ secrets.MOONCAKES_CREDS }}
        run: |
          mkdir -p ~/.moon
          printf '%s' "$MOONCAKES_CREDS" > ~/.moon/credentials.json

      - name: Publish
        run: moon publish