name: Publish to mooncakes.io

on:
  push:
    tags: ['v*']

jobs:
  test-lib:
    name: Test MoonBit Library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Check formatting
        run: moon fmt --check

      - name: Type check (no warnings)
        run: moon check 2>&1 | tee /tmp/moon-check.log && (! grep -iE "Warning.*deprecated|Bench::new" /tmp/moon-check.log || exit 1)

      - name: Run tests (no deprecation warnings)
        run: moon test 2>&1 | tee /tmp/moon-test.log && (! grep -iE "Warning.*deprecated|Bench::new" /tmp/moon-test.log || exit 1)

  publish:
    name: Publish Module
    runs-on: ubuntu-latest
    needs: [test-lib]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup MoonBit
        uses: ./.github/actions/setup-moonbit

      - name: Write credentials
        run: |
          mkdir -p ~/.moon
          echo "${{ secrets.MOONCAKES_CREDS }}" > ~/.moon/credentials.json

      - name: Publish
        run: moon publish