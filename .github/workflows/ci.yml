name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # MoonBit 库测试
  test-lib:
    name: Test MoonBit Library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Update registry
        run: moon update

      - name: Check formatting
        run: moon fmt --check

      - name: Type check (no warnings)
        run: moon check 2>&1 | tee /tmp/moon-check.log && (! grep -iE "Warning.*deprecated|Bench::new" /tmp/moon-check.log || exit 1)

      - name: Run tests (no deprecation warnings)
        run: moon test 2>&1 | tee /tmp/moon-test.log && (! grep -iE "Warning.*deprecated|Bench::new" /tmp/moon-test.log || exit 1)

  # Site 构建测试
  test-site:
    name: Build Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ./site
        run: bun install --frozen-lockfile

      - name: Build site
        working-directory: ./site
        run: bun run build
