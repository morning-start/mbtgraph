name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  pull_request_target:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-lib:
    name: Test MoonBit Library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup MoonBit
        uses: ./.github/actions/moonbit

      - name: Check formatting
        run: moon fmt --check

      - name: Type check (no warnings)
        run: moon check 2>&1 | tee /tmp/moon-check.log && (! grep -iE "Warning.*deprecated|Bench::new" /tmp/moon-check.log || exit 1)

      - name: Run tests (no deprecation warnings)
        run: moon test 2>&1 | tee /tmp/moon-test.log && (! grep -iE "Warning.*deprecated|Bench::new" /tmp/moon-test.log || exit 1)

  test-site:
    name: Build Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ./site
        run: bun install --frozen-lockfile

      - name: Build site
        working-directory: ./site
        run: bun run build