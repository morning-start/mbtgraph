name: MoonBit Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-lib:
    name: Test MoonBit Library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install MoonBit
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Type check
        shell: bash
        run: moon check

      - name: Run tests
        shell: bash
        run: moon test

      - name: Update interface and check diff
        shell: bash
        run: moon info && git diff --exit-code

      - name: Format code and check diff
        shell: bash
        run: moon fmt && git diff --exit-code