<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BFS 可视化</title>
  <link rel="stylesheet" href="/visualizations/css/viz-common.css">
</head>
<body>

  <!-- 加载状态 -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">正在加载图可视化...</div>
  </div>

  <!-- 错误状态 -->
  <div id="error-overlay">
    <div class="error-box">
      <div class="error-title">加载失败</div>
      <div class="error-msg" id="error-msg"></div>
    </div>
  </div>

  <!-- 主容器 -->
  <div class="viz-wrapper" tabindex="0" id="viz-root">
    <!-- 头部 -->
    <div class="viz-header">
      <div class="viz-header-left">
        <span class="badge">BFS</span>
        <span class="graph-info">6 节点 · 7 边 · 无向图</span>
      </div>
      <span class="hint">方向键/空格</span>
    </div>

    <!-- 画布 -->
    <div class="viz-canvas-wrap">
      <div id="viz-canvas"></div>
      <div class="tooltip" id="viz-tooltip"><div class="tooltip-inner" id="tooltip-text"></div></div>
    </div>

    <!-- 底部栏 -->
    <div class="viz-bottom-bar">
      <!-- 控制栏 -->
      <div class="viz-controls" id="viz-controls">
        <div class="viz-controls-left">
          <button class="btn btn-icon" data-action="skip-to-start" title="跳到开始">⏮</button>
          <button class="btn btn-icon" data-action="step-back" title="上一步">◀</button>
          <button class="btn btn-primary" data-action="toggle-play" id="play-btn" title="播放/暂停">
            <span id="icon-play">▶</span>
            <span id="icon-pause" class="hidden">⏸</span>
          </button>
          <button class="btn btn-icon" data-action="step-forward" title="下一步">▶</button>
          <button class="btn btn-icon" data-action="skip-to-end" title="跳到末尾">⏭</button>
        </div>
        <div class="viz-controls-center">
          <div class="progress-track" id="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
            <div class="progress-thumb" id="progress-thumb"></div>
          </div>
          <span class="step-counter" id="step-counter">0 / 0</span>
        </div>
        <div class="viz-controls-right">
          <div class="speed-control">
            <label for="speed">速度:</label>
            <input type="range" id="speed" min="1" max="10" value="5" step="1" class="speed-slider">
            <span class="speed-value" id="speed-val">5x</span>
          </div>
          <button class="btn btn-icon" data-action="reset" title="重置">↺</button>
        </div>
      </div>

      <!-- 状态栏 -->
      <div class="status-panel">
        <div class="status-item">
          <span class="status-label">当前步骤</span>
          <span class="status-value" id="msg">准备就绪 — 点击 ▶ 开始</span>
        </div>
        <div class="status-item">
          <span class="status-label">访问顺序</span>
          <span class="status-value status-mono" id="order">[ ]</span>
        </div>
        <div class="status-item">
          <span class="status-label">队列</span>
          <span class="status-value status-mono" id="queue">[ ]</span>
        </div>
        <div class="status-item">
          <span class="status-label">层级</span>
          <span class="status-value" id="levels">-</span>
        </div>
      </div>

      <!-- 图例 -->
      <div class="legend">
        <span class="legend-item"><i class="dot dot-default"></i> 未访问</span>
        <span class="legend-item"><i class="dot dot-active"></i> 处理中</span>
        <span class="legend-item"><i class="dot dot-visited"></i> 已完成</span>
        <span class="legend-item"><i class="line line-tree"></i> 树边</span>
        <span class="legend-item"><i class="line line-cross"></i> 已跳过</span>
      </div>
    </div>
  </div>

  <!-- 脚本 -->
  <script src="/visualizations/js/cytoscape-loader.js"></script>
  <script src="/visualizations/js/viz-engine.js"></script>
  <script src="/visualizations/algs/bfs.js"></script>
  <script>
    CytoscapeLoader.load(function() {
      VizApp.init({
        algoInstance: BFS,
        title: "BFS 广度优先搜索",
        subtitle: "6 节点 · 7 边 · 无向图",
        nodes: [
          { data: { id: '0', label: '0' } },
          { data: { id: '1', label: '1' } },
          { data: { id: '2', label: '2' } },
          { data: { id: '3', label: '3' } },
          { data: { id: '4', label: '4' } },
          { data: { id: '5', label: '5' } }
        ],
        edges: [
          { data: { id: 'e01', source: '0', target: '1' } },
          { data: { id: 'e04', source: '0', target: '4' } },
          { data: { id: 'e02', source: '0', target: '2' } },
          { data: { id: 'e12', source: '1', target: '2' } },
          { data: { id: 'e24', source: '2', target: '4' } },
          { data: { id: 'e25', source: '2', target: '5' } },
          { data: { id: 'e35', source: '3', target: '5' } }
        ],
        startNode: '0',
        generateSteps: BFS.generateSteps,
        executeStep: BFS.executeStep,
        rebuildTo: BFS.rebuildTo,
        updateUI: BFS.updateUI
      });
    }, function(err) {
      document.getElementById('error-msg').textContent = err;
      document.getElementById('error-overlay').classList.add('show');
    });
  </script>
</body>
</html>
