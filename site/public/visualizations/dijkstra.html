<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dijkstra 最短路径</title>
  <link rel="stylesheet" href="/visualizations/css/viz-common.css">
</head>
<body>
  <!-- 加载状态 -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">正在加载图可视化...</div>
  </div>
  
  <!-- 错误状态 -->
  <div id="error-overlay">
    <div class="error-box">
      <div class="error-title">加载失败</div>
      <div class="error-msg" id="error-msg"></div>
    </div>
  </div>

  <div class="viz-wrapper">
    <div class="viz-header">
      <div class="viz-header-left">
        <span class="badge">Dijkstra</span>
        <span class="graph-info">最短路径</span>
      </div>
    </div>

    <!-- 右上角状态面板 -->
    <div class="viz-status-panel" id="status-panel">
      <div class="viz-status-item">
        <span class="viz-status-label">当前</span>
        <span class="viz-status-value" id="current-node">—</span>
      </div>
      <div class="viz-status-item">
        <span class="viz-status-label">距离</span>
        <span class="viz-status-mono" id="dist-table">{}</span>
      </div>
      <div class="viz-status-item">
        <span class="viz-status-label">已访问</span>
        <span class="viz-status-mono" id="visited-nodes">[]</span>
      </div>
    </div>

    <div class="viz-canvas-wrap">
      <div id="viz-canvas"></div>
      <div class="viz-bottom-bar">
        <!-- Timeline / Progress Row -->
        <div class="viz-timeline">
          <div class="timeline-track" id="progress-track">
            <div class="timeline-fill" id="progress-fill"></div>
            <div class="timeline-glow"></div>
            <div class="timeline-thumb" id="progress-thumb"></div>
            <!-- step markers rendered by JS -->
          </div>
          <span class="timeline-counter" id="step-counter">0 / 14</span>
        </div>

        <!-- Transport Controls -->
        <div class="viz-transport">
          <div class="transport-group">
            <button class="ctrl-btn ctrl-btn--subtle" data-action="reset" title="重置">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            </button>
            <button class="ctrl-btn ctrl-btn--subtle" data-action="step-back" title="上一步">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18 4l-10 8 10 8V4z"/><rect x="2" y="4" width="3" height="16" rx=".5"/></svg>
            </button>
          </div>

          <!-- Hero Play Button -->
          <button class="play-hero" data-action="toggle-play" id="play-btn" title="播放/暂停">
            <div class="play-hero__ring">
              <svg class="play-icon play-icon--play" id="icon-play" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
              <svg class="play-icon play-icon--pause hidden" id="icon-pause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="3" width="5" height="18" rx="1"/><rect x="15" y="3" width="5" height="18" rx="1"/></svg>
            </div>
          </button>

          <div class="transport-group">
            <button class="ctrl-btn ctrl-btn--subtle" data-action="step-forward" title="下一步">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4l10 8-10 8V4z"/><rect x="19" y="4" width="3" height="16" rx=".5"/></svg>
            </button>
          </div>
        </div>

        <!-- Legend Strip -->
        <div class="viz-legend">
          <div class="legend-chip"><i class="legend-dot" style="background:#B45309"></i>起点</div>
          <div class="legend-chip"><i class="legend-dot" style="background:#374151"></i>未访问</div>
          <div class="legend-chip"><i class="legend-dot" style="background:#F97316"></i>处理中</div>
          <div class="legend-chip"><i class="legend-dot" style="background:#22C55E"></i>已访问</div>
          <div class="legend-chip"><i class="legend-bar" style="background:#EF4444"></i>当前边</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/visualizations/js/cytoscape-loader.js"></script>
  <script src="/visualizations/js/viz-engine.js"></script>
  <script src="/visualizations/algs/dijkstra.js"></script>
  <script>
    CytoscapeLoader.load(function() {
      VizApp.init({
        algoInstance: Dijkstra,
        title: "Dijkstra 最短路径",
        subtitle: "6 节点 · 9 边 · 带权有向图",
        directed: true,
        nodes: [
          { data: { id: '0', label: '0' } },
          { data: { id: '1', label: '1' } },
          { data: { id: '2', label: '2' } },
          { data: { id: '3', label: '3' } },
          { data: { id: '4', label: '4' } },
          { data: { id: '5', label: '5' } }
        ],
        edges: [
          { data: { id: 'e01', source: '0', target: '1', weight: '4' } },
          { data: { id: 'e02', source: '0', target: '2', weight: '2' } },
          { data: { id: 'e13', source: '1', target: '3', weight: '5' } },
          { data: { id: 'e14', source: '1', target: '4', weight: '1' } },
          { data: { id: 'e21', source: '2', target: '1', weight: '1' } },
          { data: { id: 'e23', source: '2', target: '3', weight: '8' } },
          { data: { id: 'e34', source: '3', target: '4', weight: '2' } },
          { data: { id: 'e35', source: '3', target: '5', weight: '6' } },
          { data: { id: 'e45', source: '4', target: '5', weight: '3' } }
        ],
        startNode: '0',
        generateSteps: Dijkstra.generateSteps,
        executeStep: Dijkstra.executeStep,
        rebuildTo: Dijkstra.rebuildTo,
        updateUI: Dijkstra.updateUI
      });
    }, function(err) {
      document.getElementById('error-msg').textContent = err;
      document.getElementById('error-overlay').classList.add('show');
    });
  </script>
</body>
</html>
