<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="64" cy="64" r="60" fill="url(#grad1)"/>

  <!-- 图节点 - 中心节点 -->
  <circle cx="64" cy="64" r="12" fill="white" opacity="0.95"/>

  <!-- 图节点 - 周围节点 -->
  <circle cx="64" cy="24" r="8" fill="white" opacity="0.85"/>
  <circle cx="104" cy="44" r="8" fill="white" opacity="0.85"/>
  <circle cx="104" cy="84" r="8" fill="white" opacity="0.85"/>
  <circle cx="64" cy="104" r="8" fill="white" opacity="0.85"/>
  <circle cx="24" cy="84" r="8" fill="white" opacity="0.85"/>
  <circle cx="24" cy="44" r="8" fill="white" opacity="0.85"/>

  <!-- 连接边 - 从中心到周围 -->
  <line x1="64" y1="64" x2="64" y2="24" stroke="white" stroke-width="2.5" opacity="0.7"/>
  <line x1="64" y1="64" x2="104" y2="44" stroke="white" stroke-width="2.5" opacity="0.7"/>
  <line x1="64" y1="64" x2="104" y2="84" stroke="white" stroke-width="2.5" opacity="0.7"/>
  <line x1="64" y1="64" x2="64" y2="104" stroke="white" stroke-width="2.5" opacity="0.7"/>
  <line x1="64" y1="64" x2="24" y2="84" stroke="white" stroke-width="2.5" opacity="0.7"/>
  <line x1="64" y1="64" x2="24" y2="44" stroke="white" stroke-width="2.5" opacity="0.7"/>

  <!-- 外围连接边（形成环）-->
  <line x1="64" y1="24" x2="104" y2="44" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="104" y1="44" x2="104" y2="84" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="104" y1="84" x2="64" y2="104" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="64" y1="104" x2="24" y2="84" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="24" y1="84" x2="24" y2="44" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="24" y1="44" x2="64" y2="24" stroke="white" stroke-width="1.5" opacity="0.4"/>
</svg>